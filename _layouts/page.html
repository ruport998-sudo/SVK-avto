---
layout: default
---

<article class="page">
  <header class="page-header">
    <div class="container">
      {% include breadcrumbs.html %}
      <h1>{{ page.title }}</h1>
      {% if page.subtitle %}
        <p class="page-subtitle">{{ page.subtitle }}</p>
      {% endif %}
    </div>
  </header>
  
  <div class="page-content">
    <div class="container">
      {{ content }}
    </div>
  </div>
</article>
